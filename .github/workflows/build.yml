name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Sets permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write
  issues: write
  pull-requests: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup to free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: false
          haskell: false
          large-packages: false
          docker-images: false
          swap-storage: false

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Update dependencies
        run: lake update

      - name: Get Mathlib cache
        run: lake exe cache get

      - name: Build project
        run: lake build

      - name: Build blueprint data
        # Use :blueprintPlain to skip highlighting (SubVerso panics on some code patterns)
        run: lake build :blueprintPlain

      - name: Generate upstreaming dashboard
        run: python3 scripts/upstreaming_dashboard.py

      - name: Install blueprint dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgraphviz-dev graphviz
          pip install git+https://github.com/e-vergo/leanblueprint.git

      - name: Build blueprint
        run: cd blueprint && leanblueprint web

      - name: Build docs
        run: lake -Kdoc=on build PrimeNumberTheoremAnd:docs

      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r home_page/* _site/ 2>/dev/null || true
          cp -r .lake/build/doc _site/docs
          cp -r blueprint/web _site/blueprint

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
